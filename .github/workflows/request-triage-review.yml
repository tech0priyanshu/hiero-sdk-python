name: Request triage review on beginner PRs

on:
  pull_request_target:
    types: [labeled]

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no actual review requests will be made)'
        required: false
        default: 'true'


permissions:
  contents: read
  pull-requests: write

jobs:
  request-triage:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.label && (github.event.label.name == 'Good First Issue' || github.event.label.name == 'Beginner')) }}
    runs-on: ubuntu-latest

    concurrency:
      group: request-triage-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Request triage by comment
        run: node .github/scripts/bot-pr-gfi-review-triage.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
