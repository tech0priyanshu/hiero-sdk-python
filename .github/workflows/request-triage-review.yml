name: Request triage review on beginner PRs

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  request-triage:
    if: ${{ github.event.label.name == 'Good First Issue' || github.event.label.name == 'Beginner'}}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
      - name: Request triage review
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: "Requesting triage review from: @hiero-ledger/hiero-sdk-python-triage"
            });